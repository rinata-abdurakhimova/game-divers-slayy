name: QA Bot

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate contracts and repository skills
        shell: pwsh
        run: ./tools/qa.ps1

      - name: Set up Godot
        if: ${{ hashFiles('project.godot') != '' }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: false

      - name: Run headless Godot smoke test
        if: ${{ hashFiles('project.godot') != '' }}
        shell: pwsh
        run: ./tools/qa.ps1 -RequireGodot
